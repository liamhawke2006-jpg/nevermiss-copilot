<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NeverMiss Copilot — Results</title>
<!--
  Phase 2 Copilot dashboard. Hero metric is TIME RECOVERED; the feed is the tasks
  Copilot did for the team (approve/deny on pending sensitive actions). Self-contained:
  renders on the built-in demo unless ?endpoint= is supplied. Same data contract as before.
  Params: ?client=..&token=..&accent=%23..&name=..&endpoint=..&live=1
-->
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="/brand/assets/emblem.jpg">
<meta name="theme-color" content="#070C0A">
<meta name="robots" content="noindex">
<meta property="og:title" content="NeverMiss Copilot">
<meta property="og:description" content="Time recovered for your team — powered by NeverMiss.">
<meta property="og:image" content="/brand/assets/emblem.jpg">
<style>
  :root{--bg:#070C0A;--surface:rgba(13,20,17,.82);--surface-2:#141E1A;--line:#22302B;--line-2:#2C3D37;--ink:#F2F6F4;
    --muted:#7C918A;--accent:#38D392;--accent-ink:#062015;--good:#3DDC97;--warn:#D9A946;--bad:#F0A79F;--info:#5AA9FF;--violet:#B79CFF;--radius:16px;
    --bk-disp:"Space Grotesk";--bk-sans:"Inter";--bk-mono:"JetBrains Mono"}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .mono{font-family:var(--bk-mono),monospace}
  .wrap{max-width:1120px;margin:0 auto;padding:20px 20px 64px;position:relative;z-index:1}
  a{color:var(--muted)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:6px}

  /* ── header ── */
  header{display:flex;align-items:center;gap:14px;padding:18px 0 22px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:42px;height:42px;border-radius:12px;background:var(--surface-2);color:var(--accent);display:grid;place-items:center;font:800 15px var(--bk-disp),sans-serif;box-shadow:inset 0 0 0 1px var(--line),0 4px 16px rgba(56,211,146,.14)}
  .brand h1{font-size:17px;margin:0;font-family:var(--bk-disp),sans-serif;letter-spacing:.01em}
  .brand small{color:var(--muted);font:500 11px/1.4 var(--bk-mono),monospace;letter-spacing:.06em;text-transform:uppercase}
  .spacer{flex:1}
  .lastact{font:500 11px var(--bk-mono),monospace;color:var(--muted);letter-spacing:.04em;display:flex;align-items:center;gap:7px}
  .lastact .p{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:bk-breathe 2.6s ease-in-out infinite}
  .badge{display:inline-flex;align-items:center;gap:7px;font:700 11px var(--bk-mono),monospace;padding:6px 11px;border-radius:999px;text-transform:uppercase;letter-spacing:.12em}
  .live{color:var(--good);background:rgba(56,211,146,.08);border:1px solid rgba(56,211,146,.22)}
  .demo{color:var(--warn);background:rgba(217,169,70,.1);border:1px solid rgba(217,169,70,.28)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:bk-breathe 2.6s ease-in-out infinite}
  @keyframes bk-breathe{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── narrative / hero ── */
  .narrative{background:linear-gradient(180deg,rgba(24,36,32,.66),rgba(13,20,17,.82));border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px;backdrop-filter:blur(10px);position:relative;overflow:hidden}
  .narrative::before{content:"";position:absolute;right:-40px;top:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(56,211,146,.12),transparent 70%);pointer-events:none}
  .heroflex{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
  .label{color:var(--muted);font:600 11px var(--bk-mono),monospace;text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
  .hero{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .hero .big{font-size:clamp(42px,8vw,66px);font-weight:700;line-height:1;font-family:var(--bk-disp),sans-serif;letter-spacing:-.02em}
  .hero .big.glow{text-shadow:0 0 30px rgba(56,211,146,.28)}
  .chip{font:700 12px var(--bk-mono),monospace;padding:5px 11px;border-radius:999px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px}
  .chip.up{color:var(--good);background:rgba(56,211,146,.1)}
  .chip.money{color:var(--warn);background:rgba(217,169,70,.1)}
  .story{color:var(--muted);margin-top:14px;max-width:60ch}.story b{color:var(--ink)}
  .ring{flex:none}

  /* ── kpi grid ── */
  .grid{display:grid;gap:14px;grid-template-columns:repeat(4,1fr)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;backdrop-filter:blur(10px);transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
  .card.lift:hover{transform:translateY(-3px);border-color:var(--line-2);box-shadow:0 10px 30px rgba(0,0,0,.28)}
  .card .k{color:var(--muted);font:600 11px var(--bk-mono),monospace;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:7px}
  .card .v{font-size:30px;font-weight:700;margin-top:8px;font-family:var(--bk-disp),sans-serif;letter-spacing:-.01em}
  .card .sub{margin-top:6px;font:500 12px var(--bk-mono),monospace;color:var(--muted);letter-spacing:.02em}
  .card.attention{border-color:rgba(217,169,70,.5);background:linear-gradient(180deg,rgba(217,169,70,.06),var(--surface))}
  .card.attention .v{color:var(--warn)}
  .card.attention::after{content:"";position:absolute}
  .card.attention .k .fl{width:7px;height:7px;border-radius:50%;background:var(--warn);box-shadow:0 0 0 0 rgba(217,169,70,.5);animation:flare 2s ease-out infinite}
  @keyframes flare{0%{box-shadow:0 0 0 0 rgba(217,169,70,.5)}70%,100%{box-shadow:0 0 0 8px rgba(217,169,70,0)}}
  .cardpos{position:relative}

  h3{font:600 11px var(--bk-mono),monospace;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:2px 0 14px}
  .row2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-top:14px}

  /* ── trend ── */
  .trendwrap{position:relative}
  .trend-tip{position:absolute;transform:translate(-50%,-115%);background:var(--surface-2);border:1px solid var(--line-2);border-radius:8px;padding:5px 9px;font:600 11px var(--bk-mono),monospace;color:var(--ink);pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;z-index:3}

  /* ── feed ── */
  .feed .item{display:flex;gap:12px;padding:13px 0;border-top:1px solid var(--line);align-items:flex-start}
  .feed .item:first-child{border-top:0}
  .feed .item.reveal{opacity:0;transform:translateY(8px);animation:spring .5s cubic-bezier(.34,1.4,.64,1) forwards}
  @keyframes spring{to{opacity:1;transform:none}}
  .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex:none}
  .feed .txt{font-weight:600;font-size:14px}.feed .sum{color:var(--muted);font-size:12.5px;margin-top:3px}
  .app{font:800 10px var(--bk-mono),monospace;padding:3px 7px;border-radius:6px;background:var(--surface-2);color:var(--muted);text-transform:uppercase;margin-left:8px;letter-spacing:.06em;vertical-align:1px}
  .act{margin-left:auto;display:flex;gap:6px;align-self:center}
  .act button{all:unset;cursor:pointer;font:700 12px var(--bk-mono),monospace;padding:6px 12px;border-radius:8px;letter-spacing:.04em;transition:filter .15s,transform .1s}
  .act button:active{transform:scale(.95)}
  .act button.approve{background:var(--accent);color:var(--accent-ink)}.act button.approve:hover{filter:brightness(1.08)}
  .act button.deny{background:var(--surface-2);color:var(--muted);box-shadow:inset 0 0 0 1px var(--line)}
  .pill{font:800 10px var(--bk-mono),monospace;padding:4px 9px;border-radius:999px;margin-left:auto;align-self:center;letter-spacing:.06em;text-transform:uppercase;display:inline-flex;align-items:center;gap:5px}
  .pill.done{color:var(--good);background:rgba(56,211,146,.12)}
  .pill.approved{color:var(--good);background:rgba(56,211,146,.14);animation:pop .4s ease}
  .pill.denied{color:var(--bad);background:rgba(240,167,159,.14);animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

  /* ── teammates ── */
  .emp{display:flex;align-items:center;gap:11px;margin-bottom:13px}
  .emp .rk{font:700 12px var(--bk-mono),monospace;color:var(--muted);width:14px;text-align:center}
  .emp .av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font:700 11px var(--bk-mono),monospace;color:#07110C;position:relative}
  .emp .av .crown{position:absolute;top:-9px;right:-5px;font-size:11px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  .emp .nm{font-size:13px;display:flex;align-items:center;gap:6px}
  .emp .bar{flex:1;height:8px;background:var(--surface-2);border-radius:999px;overflow:hidden}
  .emp .bar>div{height:100%;background:linear-gradient(90deg,var(--accent),#22B37E);border-radius:999px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
  .emp .hh{font-weight:700;font-size:13px;font-family:var(--bk-mono),monospace;min-width:30px;text-align:right}

  /* ── with vs without split bar ── */
  .splitwrap{margin-top:8px}
  .splitbar{height:38px;border-radius:10px;overflow:hidden;display:flex;border:1px solid var(--line);background:var(--surface-2)}
  .splitbar .seg{display:flex;align-items:center;padding:0 12px;font:700 12px var(--bk-mono),monospace;white-space:nowrap;width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1);overflow:hidden}
  .splitbar .with{background:linear-gradient(90deg,rgba(56,211,146,.28),rgba(56,211,146,.14));color:var(--good)}
  .splitbar .without{background:repeating-linear-gradient(-45deg,rgba(240,167,159,.16),rgba(240,167,159,.16) 6px,transparent 6px,transparent 12px);color:var(--bad);justify-content:flex-end}
  .splitlegend{display:flex;justify-content:space-between;margin-top:8px;font:500 11px var(--bk-mono),monospace;color:var(--muted)}
  .splitlegend b{color:var(--ink)}

  footer{color:var(--muted);font:500 11px var(--bk-mono),monospace;text-align:center;margin-top:34px;letter-spacing:.08em}
  /* skeleton */
  .sk{background:linear-gradient(100deg,var(--surface-2) 30%,#1b2823 50%,var(--surface-2) 70%);background-size:220% 100%;animation:shim 1.3s linear infinite;border-radius:10px}
  @keyframes shim{to{background-position:-220% 0}}
  @media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}.row2{grid-template-columns:1fr}.heroflex{align-items:flex-start}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.feed .item.reveal{opacity:1;transform:none}.emp .bar>div,.splitbar .seg{transition:none}}
</style>
</head>
<body>
<div class="wrap" id="app" aria-live="polite">
  <div style="padding:40px 0"><div class="sk" style="height:150px;margin-bottom:18px"></div>
    <div class="grid"><div class="sk" style="height:92px"></div><div class="sk" style="height:92px"></div><div class="sk" style="height:92px"></div><div class="sk" style="height:92px"></div></div></div>
</div>
<script>
"use strict";
const P=new URLSearchParams(location.search);
const CONFIG={endpoint:P.get("endpoint")||"",client:P.get("client")||"demo",token:P.get("token")||"demo",
  accent:P.get("accent")||"#38D392",name:P.get("name")||"Your Team",live:P.get("live")==="1"||!!P.get("endpoint"),pollMs:15000};
// API base for approve/deny is the endpoint's parent path (e.g. /api/console -> /api).
CONFIG.apiBase=CONFIG.endpoint?CONFIG.endpoint.replace(/\/[^/]*$/,""):"";
CONFIG.tenant=P.get("tenant")||"";
document.documentElement.style.setProperty("--accent",CONFIG.accent);
document.title=(CONFIG.name && CONFIG.name!=="Your Team" ? CONFIG.name+" · " : "")+"Copilot — NeverMiss";
const $=(h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild};
const N=(v,d=0)=>typeof v==="number"&&isFinite(v)?v:d;
const S=(v,d="")=>typeof v==="string"&&v.length?v:d;
const initials=(s)=>s.split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;

/* per-app accent tints for the feed badges + icon tiles */
const APPC={GHL:"var(--accent)",PDF:"var(--info)",Calendar:"var(--violet)",Invoicing:"var(--warn)",CRM:"#5BC8D6",Gmail:"var(--bad)"};
const appColor=(a)=>APPC[a]||"var(--muted)";

/* ── micro-kit: count-up, ring gauge, sparkline ── */
function countUp(el,to,fmt=(n)=>Math.round(n),ms=900){
  if(reduce){el.textContent=fmt(to);return;}
  const t0=performance.now();
  (function step(t){const p=Math.min(1,(t-t0)/ms),e=1-Math.pow(1-p,3);el.textContent=fmt(to*e);
    if(p<1)requestAnimationFrame(step);else el.textContent=fmt(to);})(t0);
}
function ringGauge(el,pct,label){
  const r=44,c=2*Math.PI*r,val=Math.max(0,Math.min(100,pct));
  el.innerHTML=`<svg width="108" height="108" viewBox="0 0 108 108" role="img" aria-label="${val}% ${label}">
    <circle cx="54" cy="54" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="9"/>
    <circle class="rg" cx="54" cy="54" r="${r}" fill="none" stroke="var(--accent)" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${c.toFixed(1)}" transform="rotate(-90 54 54)"
      style="transition:stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1)"/>
    <text x="54" y="50" text-anchor="middle" font-family="var(--bk-disp)" font-weight="700" font-size="22" fill="var(--ink)">${Math.round(val)}<tspan font-size="11" fill="var(--muted)">%</tspan></text>
    <text x="54" y="66" text-anchor="middle" font-family="var(--bk-mono)" font-size="7.5" letter-spacing=".08em" fill="var(--muted)">TO GOAL</text></svg>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{const a=el.querySelector(".rg");if(a)a.style.strokeDashoffset=(c*(1-val/100)).toFixed(1);}));
}
function sparkline(box,vals,opts={}){
  const v=vals.map(Number),W=560,H=opts.h||130,pad=6,max=Math.max(...v),min=Math.min(...v);
  const xs=(i)=>pad+((W-2*pad)*i)/(v.length-1), ys=(n)=>H-pad-((H-2*pad-6)*(n-min))/(max-min||1);
  const pts=v.map((n,i)=>`${xs(i).toFixed(1)},${ys(n).toFixed(1)}`);
  const area=`M ${xs(0)},${H-pad} L ${pts.join(" L ")} L ${xs(v.length-1)},${H-pad} Z`;
  let grid="";for(let g=1;g<=3;g++)grid+=`<line x1="0" y1="${(H*g/4).toFixed(0)}" x2="${W}" y2="${(H*g/4).toFixed(0)}" stroke="var(--line)" stroke-width="1"/>`;
  box.innerHTML=`<div class="trendwrap"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block;overflow:visible">
    <defs><linearGradient id="cpg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".30"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#cpg)"/>
    <polyline class="cpline" fill="none" stroke="var(--accent)" stroke-width="2.6" stroke-linejoin="round" points="${pts.join(" ")}"
      style="${reduce?"":`stroke-dasharray:1400;stroke-dashoffset:1400;animation:cpdraw 1.1s ease forwards`}"/>
    <circle cx="${xs(v.length-1).toFixed(1)}" cy="${ys(v[v.length-1]).toFixed(1)}" r="4.5" fill="var(--accent)" stroke="var(--bg)" stroke-width="2">
      ${reduce?"":'<animate attributeName="r" values="4.5;6.5;4.5" dur="2s" repeatCount="indefinite"/>'}</circle>
    <line class="cx" x1="0" y1="0" x2="0" y2="${H}" stroke="var(--accent)" stroke-width="1" opacity="0"/>
    <circle class="cxd" r="4" fill="var(--accent)" opacity="0"/></svg>
    <div class="trend-tip" id="ttip"></div>
    <style>@keyframes cpdraw{to{stroke-dashoffset:0}}</style></div>`;
  const svg=box.querySelector("svg"),cx=box.querySelector(".cx"),cxd=box.querySelector(".cxd"),tip=box.querySelector("#ttip");
  const fmt=opts.fmt||((x)=>x);
  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  svg.addEventListener("mousemove",(e)=>{const rc=svg.getBoundingClientRect();
    const i=Math.max(0,Math.min(v.length-1,Math.round(((e.clientX-rc.left)/rc.width)*(v.length-1))));
    const px=(xs(i)/W)*rc.width;
    cx.setAttribute("x1",xs(i));cx.setAttribute("x2",xs(i));cx.setAttribute("opacity",".4");
    cxd.setAttribute("cx",xs(i));cxd.setAttribute("cy",ys(v[i]));cxd.setAttribute("opacity","1");
    tip.style.left=px+"px";tip.style.top=((ys(v[i])/H)*rc.height)+"px";tip.style.opacity="1";
    tip.innerHTML=`<b>${days[i]||""}</b> · ${fmt(v[i])}`;});
  svg.addEventListener("mouseleave",()=>{cx.setAttribute("opacity","0");cxd.setAttribute("opacity","0");tip.style.opacity="0";});
}
function toast(msg,kind){
  let t=document.getElementById("cptoast");
  if(!t){t=document.createElement("div");t.id="cptoast";
    t.style.cssText="position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);opacity:0;z-index:50;font:700 13px var(--bk-mono),monospace;padding:11px 18px;border-radius:11px;transition:.3s;backdrop-filter:blur(8px)";
    document.body.appendChild(t);}
  const c=kind==="denied"?"var(--bad)":"var(--good)";
  t.style.background="rgba(13,20,17,.92)";t.style.border="1px solid "+c;t.style.color=c;
  t.textContent=msg;t.style.opacity="1";t.style.transform="translateX(-50%)";
  clearTimeout(t._h);t._h=setTimeout(()=>{t.style.opacity="0";t.style.transform="translateX(-50%) translateY(16px)";},2200);
}

// Built-in demo (renders standalone; mirrors the live contract shape).
const DEMO={
  hoursSaved:37,delta:18,tasksDone:214,tasksDelta:22,activeEmployees:4,pendingApprovals:2,weeklyGoal:45,
  trend:[22,25,24,29,31,34,37],laborRate:52,
  employees:[{name:"Maria R.",tasks:78,hours:14},{name:"Dev P.",tasks:63,hours:11},
    {name:"Tanya K.",tasks:44,hours:8},{name:"Luis M.",tasks:29,hours:4}],
  withWithout:{withHours:37,withoutHours:0},lastActionMin:2,
  feed:[
    {icon:"✍️",text:"Drafted 6 customer follow-up texts",app:"GHL",status:"done",summary:"Queued in Maria's outbox, awaiting her send."},
    {icon:"📄",text:"Filled the permit form for 1420 Ocean Blvd",app:"PDF",status:"pending",summary:"Ready to submit — needs approval before sending."},
    {icon:"📅",text:"Rescheduled Thursday's 2pm to Friday 9am",app:"Calendar",status:"done",summary:"Customer confirmed by text."},
    {icon:"💸",text:"Prepared invoice #1043 ($480)",app:"Invoicing",status:"pending",summary:"Drafted; hold for approval before it goes out."},
    {icon:"🔎",text:"Pulled last 3 jobs for the Cortez account",app:"CRM",status:"done",summary:"Summary posted to the job notes."}
  ]
};

let timer=null,lastGood=null,lastData=null,painted=false;
async function tick(){
  if(!CONFIG.endpoint){render(DEMO,{demo:true});return;}
  try{
    const u=new URL(CONFIG.endpoint,location.href);
    u.searchParams.set("client",CONFIG.client);u.searchParams.set("token",CONFIG.token);
    if(CONFIG.tenant)u.searchParams.set("tenant",CONFIG.tenant);
    const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();lastGood=d;render(d,{});
  }catch(e){ if(lastGood)render(lastGood,{stale:true}); else render(DEMO,{demo:true,err:String(e.message||e)}); }
  finally{ clearTimeout(timer); timer=setTimeout(tick,CONFIG.pollMs); }
}

function render(d,meta){
  const app=document.getElementById("app");app.innerHTML="";
  const isDemo=meta.demo||!CONFIG.live;
  const emps=[...(Array.isArray(d.employees)?d.employees:[])].sort((a,b)=>N(b.tasks)-N(a.tasks));
  const maxTasks=Math.max(1,...emps.map(e=>N(e.tasks)));
  const ww=d.withWithout||{};
  const money=Math.round(N(d.hoursSaved)*N(d.laborRate,52));
  const goal=N(d.weeklyGoal,Math.max(40,Math.round(N(d.hoursSaved)*1.15)));
  const goalPct=Math.min(100,Math.round(N(d.hoursSaved)/goal*100));
  const lastMin=N(d.lastActionMin,2);
  const pending=N(d.pendingApprovals);

  app.append($(`<div>
    <header>
      <div class="brand"><div class="logo">${initials(CONFIG.name)}</div>
        <div><h1>${CONFIG.name} · Copilot</h1><small>Time recovered, powered by NeverMiss</small></div></div>
      <div class="spacer"></div>
      <span class="lastact"><span class="p"></span>last action ${lastMin}m ago</span>
      <span class="badge ${isDemo?"demo":"live"}"><span class="dot"></span>${isDemo?"Demo data":"Live"}${meta.stale?" · reconnecting":""}</span>
    </header>

    <section class="narrative">
      <div class="heroflex">
        <div>
          <div class="label">Time recovered · this week</div>
          <div class="hero"><div class="big num glow" id="herohrs">0h</div>
            <span class="chip up num">▲ ${Math.abs(N(d.delta))}% vs last week</span>
            <span class="chip money num"><span id="heromoney">$0</span> of labor back</span></div>
          <p class="story">Copilot handled <b>${N(d.tasksDone)}</b> tasks for your team this week —
            about <b>${N(d.hoursSaved)} hours</b> of computer work they didn't have to do.
            <b>${pending}</b> ${pending===1?"is":"are"} waiting on a person to approve before anything sends.</p>
        </div>
        <div class="ring" id="ring" title="${goalPct}% to this week's ${goal}h goal"></div>
      </div>
    </section>

    <div class="grid">
      <div class="card lift cardpos"><div class="k">Tasks done</div><div class="v num" data-cu="${N(d.tasksDone)}">0</div><div class="sub">▲ ${N(d.tasksDelta)}% vs last week</div></div>
      <div class="card lift cardpos"><div class="k">Hours saved</div><div class="v num" data-cu="${N(d.hoursSaved)}" data-suf="h">0</div><div class="sub">across the team</div></div>
      <div class="card lift cardpos"><div class="k">People using it</div><div class="v num" data-cu="${N(d.activeEmployees)}">0</div><div class="sub">active this week</div></div>
      <div class="card lift cardpos ${pending>0?"attention":""}"><div class="k">Awaiting approval${pending>0?' <span class="fl"></span>':''}</div><div class="v num" data-cu="${pending}">0</div><div class="sub">sensitive actions held</div></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px">
        <h3 style="margin:0">Hours recovered · last 7 days</h3>
        <span class="label" style="margin:0">${N(d.hoursSaved)}h this week · hover to inspect</span></div>
      <div id="trend" style="min-height:132px;margin-top:14px"></div>
    </div>

    <div class="row2">
      <div class="card"><h3>What Copilot did</h3><div class="feed" id="feed"></div></div>
      <div class="card"><h3>By teammate</h3><div id="emps"></div>
        <h3 style="margin-top:20px">With vs without Copilot</h3>
        <div class="splitwrap"><div class="splitbar" id="splitbar">
          <div class="seg with" id="segwith"></div><div class="seg without" id="segwithout"></div></div>
          <div class="splitlegend"><span>Hours kept: <b id="lgwith">0h</b></span><span>Lost to busywork: <b id="lgwithout">0h</b></span></div>
        </div>
      </div>
    </div>
    <footer>Private results for ${CONFIG.name} · <a href="https://nevermissai.net">Powered by NeverMiss</a></footer>
  </div>`));

  // hero count-ups + ring
  countUp(document.getElementById("herohrs"),N(d.hoursSaved),(n)=>Math.round(n)+"h");
  countUp(document.getElementById("heromoney"),money,(n)=>"≈ $"+Math.round(n).toLocaleString());
  ringGauge(document.getElementById("ring"),goalPct,"goal");
  // kpi count-ups
  app.querySelectorAll("[data-cu]").forEach(el=>{const to=+el.dataset.cu,suf=el.dataset.suf||"";countUp(el,to,(n)=>Math.round(n)+suf);});

  // feed
  const feed=document.getElementById("feed");
  (Array.isArray(d.feed)?d.feed:[]).forEach((f,i)=>{
    const pend=f.status==="pending";const col=appColor(f.app);
    const right=pend
      ? `<div class="act"><button class="approve" data-a="approve">Approve</button><button class="deny" data-a="deny">Deny</button></div>`
      : `<span class="pill done">✓ Done</span>`;
    const item=$(`<div class="item reveal" style="animation-delay:${i*70}ms">
      <div class="ic" style="background:color-mix(in srgb,${col} 15%,transparent);color:${col}">${S(f.icon,"•")}</div>
      <div><div class="txt">${S(f.text,"Task")}<span class="app" style="color:${col}">${S(f.app,"")}</span></div>
      <div class="sum">${S(f.summary,"")}</div></div>${right}</div>`);
    item.querySelectorAll("[data-a]").forEach(b=>b.onclick=async()=>{
      const ok=b.dataset.a==="approve";
      // Live: actually call the engine to run or cancel the held action.
      if(CONFIG.apiBase && f.heldId!=null){
        const btns=item.querySelectorAll(".act button");btns.forEach(x=>x.disabled=true);
        try{
          const r=await fetch(CONFIG.apiBase+"/"+(ok?"approve":"deny"),
            {method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:f.heldId,tenant:CONFIG.tenant})});
          if(!r.ok)throw new Error("HTTP "+r.status);
        }catch(e){ toast("Couldn't reach Copilot — try again","denied"); btns.forEach(x=>x.disabled=false); return; }
      }
      const act=item.querySelector(".act");
      if(act)act.outerHTML=`<span class="pill ${ok?"approved":"denied"}">${ok?"✓ Approved":"✕ Denied"}</span>`;
      toast(ok?"Approved — Copilot ran it":"Denied — nothing ran",ok?"approved":"denied");
      if(CONFIG.apiBase && f.heldId!=null){ clearTimeout(timer); timer=setTimeout(tick,700); } // refresh live numbers
    });
    feed.append(item);
  });
  if(!(Array.isArray(d.feed)&&d.feed.length))
    feed.append($(`<div class="sum" style="padding:16px 0;text-align:center">🌊 All clear — Copilot's standing by for the next task.</div>`));

  // teammates
  const el=document.getElementById("emps");
  emps.forEach((e,i)=>{
    const grad=`linear-gradient(160deg,${i===0?"var(--accent)":"#3a544a"},#22B37E)`;
    const row=$(`<div class="emp"><span class="rk">${i+1}</span>
      <div class="av" style="background:${grad}">${initials(S(e.name,"?"))}${i===0?'<span class="crown">👑</span>':''}</div>
      <div style="flex:1"><div class="nm">${S(e.name,"Teammate")}</div>
      <div class="bar"><div data-w="${(N(e.tasks)/maxTasks*100).toFixed(0)}"></div></div></div>
      <div class="hh num">${N(e.hours)}h</div></div>`);
    el.append(row);
  });
  if(!emps.length)el.append($(`<div class="sum" style="padding:8px 0">No teammates onboarded yet.</div>`));
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.querySelectorAll(".bar>div").forEach(b=>b.style.width=b.dataset.w+"%");}));

  // split bar
  const wh=N(ww.withHours,N(d.hoursSaved)),woh=N(ww.withoutHours);
  const tot=Math.max(1,wh+woh);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById("segwith").style.width=(wh/tot*100)+"%";
    document.getElementById("segwithout").style.width=(woh/tot*100)+"%";
    document.getElementById("segwith").textContent=wh+"h kept";
    if(woh>0)document.getElementById("segwithout").textContent=woh+"h lost";
  }));
  countUp(document.getElementById("lgwith"),wh,(n)=>Math.round(n)+"h");
  countUp(document.getElementById("lgwithout"),woh,(n)=>Math.round(n)+"h");

  // trend
  lastData=d;
  const box=document.getElementById("trend");
  if(box&&Array.isArray(d.trend)&&d.trend.length>1)sparkline(box,d.trend,{h:130,fmt:(v)=>v+"h recovered"});
  painted=true;
}
tick();
</script>
